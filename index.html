      function stornoTx(id,idx){
        const p=getProfile(id); const tx=p.tx||[]; const t=tx[idx]; if(!t) return;
        if(!window.confirm("לבטל את התנועה: "+t.reason+" ("+(t.t==="add"?"+":t.t==="cash"?"":"−")+fmt(t.amount)+")?")) return;
        let np={...p}; let balDelta=0;
        // תיקון יתרה: ביטול ההשפעה של התנועה
        if(t.t==="add") balDelta=-t.amount;        // הייתה תוספת → מורידים
        else if(t.t==="spend") balDelta=+t.amount;  // הייתה הורדה → מחזירים
        // "cash" = רישום בלבד, לא השפיע על היתרה → balDelta=0
        np.balance=Math.max(0,(p.balance||0)+balDelta);
        // תיקון צבירה: רק אם התנועה נספרה בצבירה (הפקדה חיצונית או בונוס חיסכון)
        if(t.t==="add"){
          const td=(p.totalDeposited==null?computeDeposited(p):p.totalDeposited);
          const counted = txCounts(t);
          if(counted){ const ntd=Math.max(0,td-t.amount); np.totalDeposited=ntd; np.depositMilestone=Math.min(1000,Math.floor(ntd/100)*100); }
          else { np.totalDeposited=td; }
        }
        np.tx=tx.filter((_,i)=>i!==idx);
        writeProfile(id,np);
        writeSettings(addNotif(settings,"↩️ ההורה ביטל תנועה אצל "+nameOf(id)+": "+t.reason,[id])); }

            {pinErr && <div className="mt-2 text-center text-sm font-semibold text-rose-500">{pinErr}</div>}
            <button onClick={submitPin} className="mt-4 w-full rounded-2xl bg-emerald-900 py-3 font-bold text-white hover:bg-emerald-800">כניסה</button>
            <button onClick={()=>{setPinModal(false);setPinInput("");setPinErr("");}} className="mt-2 w-full rounded-2xl py-2 font-semibold text-emerald-600">ביטול</button>
          </div>
        </div>)}

        {pinFor && (<div className="fixed inset-0 z-30 flex items-end justify-center bg-emerald-950/40 p-3 sm:items-center" onClick={()=>setPinFor(null)}>
          <div dir="rtl" onClick={(e)=>e.stopPropagation()} className="w-full max-w-sm rounded-3xl bg-white p-6 shadow-2xl">
            <h2 className="text-center text-xl font-black text-emerald-900">הקוד של {nameOf(pinFor)}</h2>
            <p className="mt-1 text-center text-xs text-emerald-600">4 ספרות — רק {nameOf(pinFor)} יכול/ה לבצע פעולות בחשבון</p>
            <input type="password" inputMode="numeric" value={pinInput} onChange={(e)=>setPinInput(e.target.value)} onKeyDown={(e)=>{ if(e.key==="Enter") submitChildPin(); }} className="mt-4 w-full rounded-2xl border-2 border-emerald-100 p-3 text-center tracking-widest outline-none focus:border-amber-300" placeholder="••••"/>
            {pinErr && <div className="mt-2 text-center text-sm font-semibold text-rose-500">{pinErr}</div>}
            <button onClick={submitChildPin} className="mt-4 w-full rounded-2xl bg-emerald-900 py-3 font-bold text-white hover:bg-emerald-800">כניסה</button>
            <button onClick={()=>{setPinFor(null);setPinInput("");setPinErr("");}} className="mt-2 w-full rounded-2xl py-2 font-semibold text-emerald-600">ביטול</button>
            <div className="mt-1 text-center text-[10px] text-emerald-500">שכחת קוד? ההורה יכול לאפס במצב הורה</div>
          </div>
        </div>)}
      </div>);
    }

    function Modal({title,onClose,amount,setAmount,reason,setReason,reasonLabel,reasonPh,err,onConfirm,optReason,hideReason,amountLabel,showDep,countDep,setCountDep}){
      return (<div className="fixed inset-0 z-30 flex items-end justify-center bg-emerald-950/40 p-3 sm:items-center" onClick={onClose}>
        <div dir="rtl" onClick={(e)=>e.stopPropagation()} className="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl">
          <h2 className="text-center text-xl font-black text-emerald-900">{title}</h2>
          <label className="mt-4 block text-sm font-semibold text-emerald-800">{amountLabel||"סכום"}</label>
          <input type="number" inputMode="decimal" value={amount} onChange={(e)=>setAmount(e.target.value)} className="mt-1 w-full rounded-2xl border-2 border-emerald-100 p-3 text-right outline-none focus:border-amber-300" placeholder="₪"/>
          {!hideReason && (<><label className="mt-3 block text-sm font-semibold text-emerald-800">{reasonLabel}</label>
          <input value={reason} onChange={(e)=>setReason(e.target.value)} className="mt-1 w-full rounded-2xl border-2 border-emerald-100 p-3 text-right outline-none focus:border-amber-300" placeholder={reasonPh}/></>)}
          {showDep && (<label className="mt-3 flex items-center gap-2 rounded-2xl border-2 border-emerald-100 bg-emerald-50/40 p-3 cursor-pointer">
            <input type="checkbox" checked={countDep} onChange={(e)=>setCountDep(e.target.checked)} className="h-5 w-5 accent-emerald-700"/>
            <span className="text-sm font-semibold text-emerald-800">💰 נספר לבונוס חיסכון</span>
          </label>)}
          {err && <div className="mt-2 text-sm font-semibold text-rose-500">{err}</div>}
          <button onClick={onConfirm} className="mt-5 w-full rounded-2xl bg-emerald-900 py-3 font-bold text-white hover:bg-emerald-800">אישור</button>
          <button onClick={onClose} className="mt-2 w-full rounded-2xl py-2 font-semibold text-emerald-600">ביטול</button>
        </div>
      </div>);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
